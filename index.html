<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Jameel Marikkar Family Tree</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #FAF6F0;
            font-family: 'Lato', 'Segoe UI', sans-serif;
            color: #3E2723;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            touch-action: none;
        }

        /* ── Header ─────────────────────────────────────────── */
        #header {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: linear-gradient(180deg, #FAF6F0 60%, transparent);
            text-align: center;
            padding: 12px 16px 20px;
            pointer-events: none;
        }

        #header h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 1.3rem;
            font-weight: 700;
            color: #3E2723;
            letter-spacing: 0.5px;
        }

        .ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 4px;
        }
        .ornament .line { width: 40px; height: 1px; background: #C9A96E; }
        .ornament .dot { width: 4px; height: 4px; border-radius: 50%; background: #C9A96E; }
        .ornament .dot.c { width: 5px; height: 5px; }

        /* ── Splash screen ──────────────────────────────────── */
        #splash {
            position: fixed;
            inset: 0;
            z-index: 200;
            background: #FAF6F0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.8s ease;
        }
        #splash.fade-out { opacity: 0; pointer-events: none; }

        #splash h1 {
            font-family: 'Playfair Display', Georgia, serif;
            font-size: clamp(1.6rem, 5vw, 2.6rem);
            font-weight: 700;
            color: #3E2723;
            letter-spacing: 1px;
            opacity: 0;
            transform: translateY(20px);
            animation: splashTitle 1s 0.3s ease forwards;
        }

        #splash .splash-ornament {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            margin-top: 10px;
            opacity: 0;
            animation: splashFade 0.8s 0.8s ease forwards;
        }
        #splash .splash-ornament .line {
            width: 0;
            height: 1px;
            background: #C9A96E;
            animation: lineGrow 0.6s 1.1s ease forwards;
        }
        #splash .splash-ornament .dot {
            width: 5px; height: 5px; border-radius: 50%; background: #C9A96E;
        }
        #splash .splash-ornament .dot.c { width: 6px; height: 6px; }

        #splash .splash-leaf {
            margin-top: 30px;
            opacity: 0;
            animation: splashFade 0.6s 1.4s ease forwards;
        }

        @keyframes splashTitle {
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes splashFade {
            to { opacity: 1; }
        }
        @keyframes lineGrow {
            to { width: 50px; }
        }

        /* ── Controls ───────────────────────────────────────── */
        #controls {
            position: fixed;
            bottom: 20px;
            right: 16px;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        #controls button {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: 1.5px solid #D7CCC8;
            background: rgba(255,255,255,0.92);
            color: #5D4037;
            font-size: 20px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 2px 8px rgba(62,39,35,0.12);
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }

        #controls button:hover { background: #FFF8E1; }
        #controls button:active { background: #F0E8DA; }

        #controls button svg { width: 20px; height: 20px; }

        /* ── Hint toast ─────────────────────────────────────── */
        #hint {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            background: rgba(93,64,55,0.88);
            color: #FFF8E1;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 0.82rem;
            pointer-events: none;
            opacity: 1;
            transition: opacity 0.6s;
        }
        #hint.hidden { opacity: 0; }

        /* ── Tree canvas ────────────────────────────────────── */
        #canvas {
            position: absolute;
            top: 0; left: 0;
            transform-origin: 0 0;
            will-change: transform;
        }
        #canvas.smooth {
            transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        /* Connectors SVG */
        #connectors {
            position: absolute;
            top: 0; left: 0;
            pointer-events: none;
        }

        /* ── Node cards ─────────────────────────────────────── */
        .node {
            position: absolute;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 10px 16px;
            cursor: pointer;
            transition: left 0.6s cubic-bezier(0.25,0.46,0.45,0.94),
                        top 0.6s cubic-bezier(0.25,0.46,0.45,0.94),
                        opacity 0.4s ease,
                        box-shadow 0.25s, transform 0.25s;
            -webkit-tap-highlight-color: transparent;
        }

        .node:hover {
            transform: translateY(-2px);
        }

        .node.highlight {
            box-shadow: 0 0 0 3px #C9A96E, 0 4px 16px rgba(62,39,35,0.25) !important;
            transform: translateY(-2px);
        }

        .node .name {
            font-weight: 700;
            line-height: 1.35;
            white-space: nowrap;
        }

        /* Intro animation for nodes */
        .node.anim-hidden {
            opacity: 0;
            transform: scale(0.5) translateY(-20px);
        }
        .node.anim-grow {
            animation: nodeGrow 0.5s ease forwards;
        }
        @keyframes nodeGrow {
            0%   { opacity: 0; transform: scale(0.5) translateY(-20px); }
            60%  { opacity: 1; transform: scale(1.05) translateY(0); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Connector draw-in animation */
        #connectors path {
            transition: opacity 0.3s;
        }
        #connectors path.anim-draw {
            animation: drawBranch 0.6s ease forwards;
        }
        @keyframes drawBranch {
            to { stroke-dashoffset: 0; }
        }

        /* Level 0 - Root */
        .node.L0 {
            background: linear-gradient(180deg, #7D5A4A, #5D4037);
            border: 2px solid #C9A96E;
            box-shadow: 0 0 20px rgba(201,169,110,0.2), 0 4px 12px rgba(62,39,35,0.18);
        }
        .node.L0 .name { color: #FFF8E1; font-size: 17px; }

        /* Level 1 - Children */
        .node.L1 {
            background: linear-gradient(180deg, #43A047, #2E7D32);
            border: 1.5px solid #1B5E20;
            box-shadow: 0 3px 10px rgba(46,125,50,0.2);
        }
        .node.L1 .name { color: #FFFFFF; font-size: 15px; }

        /* Level 2 - Grandchildren */
        .node.L2 {
            background: linear-gradient(180deg, #A5D6A7, #81C784);
            border: 1.5px solid #4CAF50;
            box-shadow: 0 3px 10px rgba(129,199,132,0.25);
        }
        .node.L2 .name { color: #1B5E20; font-size: 14px; }

        /* Level 3 - Great-grandchildren */
        .node.L3 {
            background: linear-gradient(180deg, #FFFDE7, #FFF9C4);
            border: 1.5px solid #F9A825;
            box-shadow: 0 3px 10px rgba(249,168,37,0.15);
        }
        .node.L3 .name { color: #5D4037; font-size: 14px; }
    </style>
</head>
<body>

<!-- Splash screen -->
<div id="splash">

    <div class="splash-ornament">

        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 8V5a2 2 0 012-2h3M21 8V5a2 2 0 00-2-2h-3M3 16v3a2 2 0 002 2h3M21 16v3a2 2 0 01-2 2h-3"/></svg>

</div>

<div id="hint" style="opacity:0;">Pinch to zoom &middot; Drag to pan &middot; Tap a name to highlight</div>

<div id="canvas">
    <svg id="connectors"></svg>
</div>

<script>
// ── Family data ─────────────────────────────────────────────
const treeData = {
    label: "Mohammed Jameel Marikkar\n&\nHaleema Nachiya", id: "root",
    children: [
        { label: "Ahmed Fuward\n&\nFathima Nazliya", id: "c1", children: [
            { label: "Nafla Fuward\n&\nMilhan Bahar", id: "c1a", children: [
                { label: "Hajara", id: "c1a1" },
                { label: "Hafsa", id: "c1a2" },
                { label: "Hashma", id: "c1a3" },
                { label: "Hairah", id: "c1a4" },
            ]},
            { label: "Shafna Fuward\n&\nAzam Hamdoon", id: "c1b", children: [
                { label: "Hana", id: "c1b1" },
                { label: "Haroon", id: "c1b2" },

            ]},

                { label: "Khalid", id: "c1c1" },
            ]},
            { label: "Nazeel Fuward\n&\nFathima Sabeeha", id: "c1d" },
        ]},
        { label: "Marhoma Fuwarda\n&\nYoosuf Ismail", id: "c2", children: [
            { label: "Minsha Ismail\n&\nFathima Zinha", id: "c2a", children: [
                { label: "Sumaiyya", id: "c2a1" },
                { label: "Hayah", id: "c2a2" },
            ]},
            { label: "Shafras Ismail\n&\nFathima Ziqra", id: "c2b", children: [
                { label: "Zaid", id: "c2b1" },
                { label: "Noorah", id: "c2b2" },
            ]},
            { label: "Zimra Ismail\n&\nAkhlas Ashraff", id: "c2c", children: [
                { label: "Ammar", id: "c2c1" },
                { label: "Muhammadh", id: "c2c2" },
                { label: "Khadijah", id: "c2c3" },
            ]},
            { label: "Mubeen Ismail\n&\nFathima Nuzla", id: "c2d", children: [
                { label: "Adam", id: "c2d1" },
            ]},
        ]},
        { label: "Fazliya Hanim\n&\nIqbal Azeez", id: "c3", children: [
            { label: "Rizan Iqbal\n&\nFathima Jezla", id: "c3a", children: [
                { label: "Noorah", id: "c3a1" },
                { label: "Ayrah", id: "c3a2" },
            ]},
        ]},
        { label: "Fathima Fazeela\n&\nAhsan Shareef", id: "c4", children: [
            { label: "Lafrina Ahsan\n&\nIshak Ansar", id: "c4a", children: [
                { label: "Eesa", id: "c4a1" },
            ]},
            { label: "Luqman Ahsan", id: "c4b" },
        ]},
        { label: "Ahmad Fahim\n&\nFathima Rizmiya", id: "c5", children: [
            { label: "Rifla Fahim\n&\nAkil Faseeh", id: "c5a" },
            { label: "Fahma Fahim", id: "c5b" },
            { label: "Abdulbasith Fahim", id: "c5c" },
        ]},
        { label: "Ahmad Fazloon\n&\nFathima Ifama", id: "c6", children: [
            { label: "Farha Fazloon\n&\nMufeez Azam", id: "c6a" },
            { label: "Insaf Fazloon", id: "c6b" },
            { label: "Inaam Fazloon", id: "c6c" },
            { label: "Imam Fazloon", id: "c6d" },
        ]},
        { label: "Farshiya Hanim\n&\nRifdhi Jameel", id: "c7", children: [
            { label: "Abdulrahman Rifdhi", id: "c7a" },
            { label: "Ayyoob Rifdhi\n&\nFathima Shakira", id: "c7b" },
            { label: "Usman Rifdhi", id: "c7c" },
            { label: "Ahmed Rifdhi", id: "c7d" },
        ]},
        { label: "Fathima Farhana\n&\nZawahir Thaha", id: "c8", children: [
            { label: "Thabiya Zawahir", id: "c8a" },
            { label: "Nuzha Zawahir", id: "c8b" },
            { label: "Zahra Zawahir", id: "c8c" },
        ]},
        { label: "Ahmad Quhaf\n&\nFathima Ashika", id: "c9", children: [
            { label: "Ajmal Quhaf", id: "c9a" },
            { label: "Reshma Quhaf", id: "c9b" },
        ]},
    ]
};

// ── Layout engine ───────────────────────────────────────────
const COUPLE_H = 80, LEAF_H = 52, H_GAP = 32, V_GAP = 120, H_PAD = 36;
const FONT_COUPLE = 15, FONT_SINGLE = 15;

function isCouple(label) { return label.includes("\n&\n"); }

function nameLines(label) { return label.split("\n").filter(l => l !== "&"); }

function calcWidth(label) {
    const lines = nameLines(label);
    const fs = isCouple(label) ? FONT_COUPLE : FONT_SINGLE;
    const longest = Math.max(...lines.map(l => l.length));
    return Math.max(longest * fs * 0.58 + H_PAD, 130);
}

function subtreeWidth(node) {
    const ownW = calcWidth(node.label) + H_GAP;
    if (!node.children || !node.children.length) return ownW;
    const childW = node.children.reduce((s, c) => s + subtreeWidth(c), 0);
    return Math.max(childW, ownW);
}

const allNodes = []; // {id, x, y, w, h, label, level}
const allEdges = []; // {from, to}

function layoutNode(node, xStart, y, level, parentId) {
    const couple = isCouple(node.label);
    const w = calcWidth(node.label);
    let h = couple ? COUPLE_H : LEAF_H;
    if (level === 0) h += 14;
    const totalW = subtreeWidth(node);
    const x = xStart + totalW / 2 - w / 2;

    allNodes.push({ id: node.id, x, y, w, h, label: node.label, level });
    if (parentId) allEdges.push({ from: parentId, to: node.id });

    if (node.children) {
        let cx = xStart;
        for (const ch of node.children) {
            const cw = subtreeWidth(ch);
            layoutNode(ch, cx, y + h + V_GAP, level + 1, node.id);
            cx += cw;
        }
    }
}

layoutNode(treeData, 0, 0, 0, null);

const treeW = Math.max(...allNodes.map(n => n.x + n.w)) + 80;
const treeH = Math.max(...allNodes.map(n => n.y + n.h)) + 80;
const PAD = 40; // internal canvas padding

const nodeLookup = {};
allNodes.forEach(n => nodeLookup[n.id] = n);

// ── Build parent map for highlight ──────────────────────────
const parentMap = {};
allEdges.forEach(e => parentMap[e.to] = e.from);
const childrenMap = {};
allEdges.forEach(e => {
    if (!childrenMap[e.from]) childrenMap[e.from] = [];
    childrenMap[e.from].push(e.to);
});

function getAncestors(id) {
    const set = new Set();
    let cur = id;
    while (cur) { set.add(cur); cur = parentMap[cur]; }
    return set;
}

function getDescendants(id) {
    const set = new Set([id]);
    const stack = [id];
    while (stack.length) {
        const cur = stack.pop();
        (childrenMap[cur] || []).forEach(c => { set.add(c); stack.push(c); });
    }
    return set;
}

// ── Render nodes ────────────────────────────────────────────
const canvas = document.getElementById('canvas');
const connSvg = document.getElementById('connectors');

canvas.style.width = (treeW + PAD * 2) + 'px';
canvas.style.height = (treeH + PAD * 2) + 'px';
connSvg.setAttribute('width', treeW + PAD * 2);
connSvg.setAttribute('height', treeH + PAD * 2);
connSvg.style.width = (treeW + PAD * 2) + 'px';
connSvg.style.height = (treeH + PAD * 2) + 'px';

// Draw bezier connectors
const branchColors = { 0: '#6D4C41', 1: '#5D4037', 2: '#6D8B74', 3: '#A5D6A7' };
const branchWidths = { 0: 3, 1: 2.4, 2: 2, 3: 1.6 };

allEdges.forEach(e => {
    const s = nodeLookup[e.from], t = nodeLookup[e.to];
    const sx = s.x + s.w / 2 + PAD, sy = s.y + s.h + PAD;
    const tx = t.x + t.w / 2 + PAD, ty = t.y + PAD;
    const cp = V_GAP * 0.55;
    const path = document.createElementNS('http://www.w3.org/2000/svg', 'path');
    path.setAttribute('d', `M${sx},${sy} C${sx},${sy+cp} ${tx},${ty-cp} ${tx},${ty}`);
    path.setAttribute('fill', 'none');
    path.setAttribute('stroke', branchColors[s.level] || '#A5D6A7');
    path.setAttribute('stroke-width', branchWidths[s.level] || 1.6);
    path.setAttribute('stroke-linecap', 'round');
    path.setAttribute('opacity', '0');
    path.dataset.from = e.from;
    path.dataset.to = e.to;
    path.dataset.level = s.level;
    connSvg.appendChild(path);
});

// Create node elements
const nodeEls = {};
allNodes.forEach(n => {
    const div = document.createElement('div');
    div.className = `node L${Math.min(n.level, 3)} anim-hidden`;
    div.style.left = (n.x + PAD) + 'px';
    div.style.top = (n.y + PAD) + 'px';
    div.style.width = n.w + 'px';
    div.style.height = n.h + 'px';
    div.dataset.id = n.id;

    const lines = nameLines(n.label);
    lines.forEach(l => {
        const span = document.createElement('div');
        span.className = 'name';
        span.textContent = l;
        div.appendChild(span);
    });

    div.addEventListener('click', (e) => {
        e.stopPropagation();
        toggleHighlight(n.id);
    });

    canvas.appendChild(div);
    nodeEls[n.id] = div;
});

// ── Highlight + rearrange logic ──────────────────────────────
let highlightedId = null;
let connectorTimer = null;

function smoothOn() { canvas.classList.add('smooth'); }
function smoothOff() { canvas.classList.remove('smooth'); }

// Store original positions
const origPos = {};
allNodes.forEach(n => { origPos[n.id] = { x: n.x + PAD, y: n.y + PAD }; });

// Store edge path elements keyed by "from-to"
const edgePaths = {};
connSvg.querySelectorAll('path').forEach(p => {
    edgePaths[`${p.dataset.from}-${p.dataset.to}`] = p;
});

function computeEdgeD(fromId, toId, positions) {
    const s = nodeLookup[fromId], t = nodeLookup[toId];
    const sp = positions[fromId], tp = positions[toId];
    const sx = sp.x + s.w / 2, sy = sp.y + s.h;
    const ex = tp.x + t.w / 2, ey = tp.y;
    const cp = V_GAP * 0.55;
    return `M${sx},${sy} C${sx},${sy+cp} ${ex},${ey-cp} ${ex},${ey}`;
}

function redrawConnectors(positions, familySet) {
    allEdges.forEach(e => {
        const path = edgePaths[`${e.from}-${e.to}`];
        if (!path) return;
        if (familySet && (!familySet.has(e.from) || !familySet.has(e.to))) {
            path.setAttribute('opacity', '0');
            return;
        }
        path.setAttribute('d', computeEdgeD(e.from, e.to, positions));
        const baseBw = branchWidths[nodeLookup[e.from].level] || 1.6;
        if (familySet) {
            path.setAttribute('opacity', '0.8');
            path.setAttribute('stroke-width', baseBw * 1.3);
        } else {
            path.setAttribute('opacity', '0.5');
            path.setAttribute('stroke-width', baseBw);
        }
    });
}

// Build a mini tree for any node: ancestors chain + descendants subtree
function buildFamilySubtree(id) {
    // Walk ancestors to root
    const ancestorChain = [];
    let cur = id;
    while (cur) { ancestorChain.unshift(cur); cur = parentMap[cur]; }

    // Recursive function: given a node id, build its subtree data
    function buildSubtreeData(nid) {
        const n = nodeLookup[nid];
        const result = { id: nid, label: n.label, w: n.w, h: n.h, level: n.level };
        const kids = (childrenMap[nid] || []);
        if (kids.length) result.children = kids.map(buildSubtreeData);
        return result;
    }

    // Build from clicked node down (full descendants)
    const clickedSubtree = buildSubtreeData(id);

    // Now wrap in ancestor chain: each ancestor has only the relevant child
    let subtree = clickedSubtree;
    for (let i = ancestorChain.length - 2; i >= 0; i--) {
        const aid = ancestorChain[i];
        const an = nodeLookup[aid];
        subtree = { id: aid, label: an.label, w: an.w, h: an.h, level: an.level, children: [subtree] };
    }
    return subtree;
}

// Layout a subtree and return positions map centered on canvas
function layoutSubtree(subtree) {
    const positions = {};
    const subEdges = [];

    function stWidth(node) {
        const ownW = node.w + H_GAP;
        if (!node.children || !node.children.length) return ownW;
        const childW = node.children.reduce((s, c) => s + stWidth(c), 0);
        return Math.max(childW, ownW);
    }

    function stLayout(node, xStart, y, parentId) {
        const totalW = stWidth(node);
        const x = xStart + totalW / 2 - node.w / 2;
        positions[node.id] = { x, y, w: node.w, h: node.h };
        if (parentId) subEdges.push({ from: parentId, to: node.id });
        if (node.children) {
            let cx = xStart;
            for (const ch of node.children) {
                stLayout(ch, cx, y + node.h + V_GAP, node.id);
                cx += stWidth(ch);
            }
        }
    }

    stLayout(subtree, 0, 0, null);

    // Center the result on the canvas
    const xs = Object.values(positions);
    const minX = Math.min(...xs.map(p => p.x));
    const maxX = Math.max(...xs.map(p => p.x + p.w));
    const minY = Math.min(...xs.map(p => p.y));
    const maxY = Math.max(...xs.map(p => p.y + p.h));
    const canvasCx = (treeW + PAD * 2) / 2;
    const canvasCy = (treeH + PAD * 2) / 2;
    const offX = canvasCx - (minX + maxX) / 2;
    const offY = canvasCy - (minY + maxY) / 2;

    const centered = {};
    for (const [nid, p] of Object.entries(positions)) {
        centered[nid] = { x: p.x + offX, y: p.y + offY };
    }
    return { positions: centered, edges: subEdges, w: maxX - minX, h: maxY - minY };
}

function toggleHighlight(id) {
    if (highlightedId === id) {
        clearHighlight();
        return;
    }
    if (connectorTimer) { clearTimeout(connectorTimer); connectorTimer = null; }

    // If switching highlight, instantly restore positions first
    if (highlightedId) {
        allNodes.forEach(n => {
            const el = nodeEls[n.id];
            el.style.transition = 'none';
            el.style.left = origPos[n.id].x + 'px';
            el.style.top = origPos[n.id].y + 'px';
        });
        canvas.offsetHeight; // force reflow
        allNodes.forEach(n => { nodeEls[n.id].style.transition = ''; });
    }

    highlightedId = id;
    const family = new Set([...getAncestors(id), ...getDescendants(id)]);

    // Build and layout a fresh subtree centered on canvas
    const subtree = buildFamilySubtree(id);
    const { positions: newPos, edges: subEdges, w: famW, h: famH } = layoutSubtree(subtree);

    // Hide all connectors during move
    connSvg.querySelectorAll('path').forEach(p => p.setAttribute('opacity', '0'));

    // Move family nodes to new centered positions, hide all others
    allNodes.forEach(n => {
        const el = nodeEls[n.id];
        if (newPos[n.id]) {
            el.style.left = newPos[n.id].x + 'px';
            el.style.top = newPos[n.id].y + 'px';
            el.classList.add('highlight');
            el.style.opacity = '1';
            el.style.pointerEvents = '';
        } else {
            el.classList.remove('highlight');
            el.style.opacity = '0';
            el.style.pointerEvents = 'none';
        }
    });

    // After nodes finish moving, draw family connectors at new positions
    connectorTimer = setTimeout(() => {
        // Redraw only the family edges
        allEdges.forEach(e => {
            const path = edgePaths[`${e.from}-${e.to}`];
            if (!path) return;
            if (newPos[e.from] && newPos[e.to]) {
                path.setAttribute('d', computeEdgeD(e.from, e.to, newPos));
                const baseBw = branchWidths[nodeLookup[e.from].level] || 1.6;
                path.setAttribute('opacity', '0.8');
                path.setAttribute('stroke-width', baseBw * 1.3);
            } else {
                path.setAttribute('opacity', '0');
            }
        });
    }, 650);

    // Zoom viewport to fit
    const vw = window.innerWidth, vh = window.innerHeight;
    const newScale = Math.min(vw / (famW + 120), vh / (famH + 120)) * 0.85;
    const clampedScale = Math.max(0.2, Math.min(2.5, newScale));
    const newTx = (vw - (treeW + PAD * 2) * clampedScale) / 2;
    const newTy = (vh - (treeH + PAD * 2) * clampedScale) / 2;

    smoothOn();
    scale = clampedScale;
    tx = newTx;
    ty = newTy;
    applyTransform();
    canvas.addEventListener('transitionend', smoothOff, { once: true });
}

function clearHighlight() {
    if (connectorTimer) { clearTimeout(connectorTimer); connectorTimer = null; }
    highlightedId = null;

    // Hide connectors during move
    connSvg.querySelectorAll('path').forEach(p => p.setAttribute('opacity', '0'));

    // Restore all nodes to original positions
    allNodes.forEach(n => {
        const el = nodeEls[n.id];
        el.style.left = origPos[n.id].x + 'px';
        el.style.top = origPos[n.id].y + 'px';
        el.classList.remove('highlight');
        el.style.opacity = '1';
        el.style.pointerEvents = '';
    });

    // After nodes settle, redraw all connectors at original positions
    connectorTimer = setTimeout(() => {
        redrawConnectors(origPos, null);
    }, 650);

    // Zoom back to full tree
    smoothOn();
    fitToScreen();
    canvas.addEventListener('transitionend', smoothOff, { once: true });
}

canvas.addEventListener('click', (e) => {
    if (e.target === canvas || e.target === connSvg) clearHighlight();
});

// ── Panzoom ─────────────────────────────────────────────────
let scale = 1, tx = 0, ty = 0;
let isDragging = false, dragStartX, dragStartY, dragTxStart, dragTyStart;

function applyTransform() {
    canvas.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;
}

function fitToScreen() {
    const vw = window.innerWidth, vh = window.innerHeight;
    const sx = vw / (treeW + PAD * 2);
    const sy = vh / (treeH + PAD * 2);
    scale = Math.min(sx, sy) * 0.92;
    tx = (vw - (treeW + PAD * 2) * scale) / 2;
    ty = (vh - (treeH + PAD * 2) * scale) / 2 + 20;
    applyTransform();
}

function zoomAtCenter(factor) {
    const vw = window.innerWidth, vh = window.innerHeight;
    const cx = vw / 2, cy = vh / 2;
    zoomAt(cx, cy, factor);
}

function zoomAt(cx, cy, factor) {
    const newScale = Math.max(0.1, Math.min(3, scale * factor));
    tx = cx - (cx - tx) * (newScale / scale);
    ty = cy - (cy - ty) * (newScale / scale);
    scale = newScale;
    applyTransform();
}

// Mouse drag
canvas.addEventListener('mousedown', e => {
    if (e.target.closest('.node')) return;
    smoothOff();
    isDragging = true;
    dragStartX = e.clientX; dragStartY = e.clientY;
    dragTxStart = tx; dragTyStart = ty;
    canvas.style.cursor = 'grabbing';
});
window.addEventListener('mousemove', e => {
    if (!isDragging) return;
    tx = dragTxStart + (e.clientX - dragStartX);
    ty = dragTyStart + (e.clientY - dragStartY);
    applyTransform();
});
window.addEventListener('mouseup', () => {
    isDragging = false;
    canvas.style.cursor = '';
});

// Mouse wheel zoom
window.addEventListener('wheel', e => {
    e.preventDefault();
    smoothOff();
    const factor = e.deltaY < 0 ? 1.08 : 0.92;
    zoomAt(e.clientX, e.clientY, factor);
}, { passive: false });

// Touch: pinch zoom + drag
let touches = [];
let lastTouchDist = 0, lastTouchCenter = null;
let touchDragging = false;

canvas.addEventListener('touchstart', e => {
    touches = [...e.touches];
    if (touches.length === 1 && !e.target.closest('.node')) {
        smoothOff();
        touchDragging = true;
        dragStartX = touches[0].clientX;
        dragStartY = touches[0].clientY;
        dragTxStart = tx; dragTyStart = ty;
    }
    if (touches.length === 2) {
        touchDragging = false;
        lastTouchDist = Math.hypot(
            touches[1].clientX - touches[0].clientX,
            touches[1].clientY - touches[0].clientY
        );
        lastTouchCenter = {
            x: (touches[0].clientX + touches[1].clientX) / 2,
            y: (touches[0].clientY + touches[1].clientY) / 2
        };
    }
}, { passive: true });

canvas.addEventListener('touchmove', e => {
    e.preventDefault();
    touches = [...e.touches];
    if (touches.length === 1 && touchDragging) {
        tx = dragTxStart + (touches[0].clientX - dragStartX);
        ty = dragTyStart + (touches[0].clientY - dragStartY);
        applyTransform();
    }
    if (touches.length === 2) {
        const dist = Math.hypot(
            touches[1].clientX - touches[0].clientX,
            touches[1].clientY - touches[0].clientY
        );
        const center = {
            x: (touches[0].clientX + touches[1].clientX) / 2,
            y: (touches[0].clientY + touches[1].clientY) / 2
        };
        if (lastTouchDist > 0) {
            const factor = dist / lastTouchDist;
            zoomAt(center.x, center.y, factor);
        }
        // Pan while pinching
        if (lastTouchCenter) {
            tx += center.x - lastTouchCenter.x;
            ty += center.y - lastTouchCenter.y;
            applyTransform();
        }
        lastTouchDist = dist;
        lastTouchCenter = center;
    }
}, { passive: false });

canvas.addEventListener('touchend', () => {
    touchDragging = false;
    lastTouchDist = 0;
    lastTouchCenter = null;
});

// Buttons
document.getElementById('zoomIn').addEventListener('click', () => zoomAtCenter(1.3));
document.getElementById('zoomOut').addEventListener('click', () => zoomAtCenter(0.7));
document.getElementById('fitBtn').addEventListener('click', () => {
    clearHighlight();
});

// ── Intro animation sequence ────────────────────────────────
fitToScreen();

const maxLevel = Math.max(...allNodes.map(n => n.level));
const SPLASH_DURATION = 2200;   // splash screen visible time
const LEVEL_DELAY = 350;        // delay between each level animating in
const NODE_STAGGER = 60;        // stagger between siblings at same level

function animateIn() {
    const splash = document.getElementById('splash');
    splash.classList.add('fade-out');

    // Show header and controls
    setTimeout(() => {
        document.getElementById('header').style.opacity = '1';
        document.getElementById('controls').style.opacity = '1';
        splash.addEventListener('transitionend', () => splash.remove(), { once: true });
    }, 200);

    // Animate nodes level by level
    for (let lvl = 0; lvl <= maxLevel; lvl++) {
        const nodesAtLevel = allNodes.filter(n => n.level === lvl);
        nodesAtLevel.forEach((n, idx) => {
            const delay = lvl * LEVEL_DELAY + idx * NODE_STAGGER;
            setTimeout(() => {
                const el = nodeEls[n.id];
                el.classList.remove('anim-hidden');
                el.classList.add('anim-grow');
                el.addEventListener('animationend', () => {
                    el.classList.remove('anim-grow');
                }, { once: true });
            }, delay);
        });

        // Animate connectors FROM this level (appear after level's nodes)
        const edgesFromLevel = document.querySelectorAll(`#connectors path[data-level="${lvl}"]`);
        edgesFromLevel.forEach((path, idx) => {
            const delay = lvl * LEVEL_DELAY + 200 + idx * 40;
            setTimeout(() => {
                const len = path.getTotalLength();
                path.style.strokeDasharray = len;
                path.style.strokeDashoffset = len;
                path.setAttribute('opacity', '0.5');
                path.classList.add('anim-draw');
                path.addEventListener('animationend', () => {
                    path.classList.remove('anim-draw');
                    path.style.strokeDasharray = '';
                    path.style.strokeDashoffset = '';
                }, { once: true });
            }, delay);
        });
    }

    // Show hint after tree is fully revealed
    // Account for max stagger: last level's last node
    const maxStagger = Math.max(...Array.from({length: maxLevel+1}, (_, lvl) =>
        lvl * LEVEL_DELAY + allNodes.filter(n => n.level === lvl).length * NODE_STAGGER
    ));
    const totalAnimTime = maxStagger + 800;
    setTimeout(() => {
        const hint = document.getElementById('hint');
        hint.style.opacity = '1';
        hint.style.transition = 'opacity 0.6s';
        setTimeout(() => hint.classList.add('hidden'), 3500);
    }, totalAnimTime);
}

// Start animation after splash has played
setTimeout(animateIn, SPLASH_DURATION);

// Handle resize
window.addEventListener('resize', fitToScreen);
</script>
</body>
</html>
